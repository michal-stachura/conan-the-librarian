services:
  docs:
    image: conan_the_librarian_local_docs
    container_name: conan_the_librarian_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - /app/.venv
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./conan_the_librarian:/app/conan_the_librarian:z
    ports:
      - '9000:9000'
    command: /start-docs
